name: Test Action

on: [pull_request, push, workflow_dispatch]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: windows-11-arm

    steps:
      - name: Install all tools
        uses: crueter-ci/install-tools@master
        with:
          pkgconf: true
          zstd: true
          vulkan: true
          nasm: true
          ffnvcodec: true

      - name: Check
        shell: bash
        run: |
          zstd --version
          pkgconf --version
          echo "$VULKAN_SDK"

          if [[ "${{ matrix.os }}" == windows-latest ]]; then
            nasm --version
          fi

          export PKG_CONFIG_PATH="$(cygpath -u $FFNVCODEC_DIR)/lib/pkgconfig"
          pkg-config --cflags ffnvcodec

          ls "$VULKAN_SDK/lib"
          echo
          ls "$VULKAN_SDK/lib/pkgconfig"

          export PKG_CONFIG_PATH="$(cygpath -u $VULKAN_SDK)/lib/pkgconfig"
          pkg-config --cflags vulkan

          echo
          echo "$PATH"